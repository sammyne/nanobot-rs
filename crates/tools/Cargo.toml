[package]
name = "nanobot-tools"
version = "0.1.0"
edition = "2024"
authors = ["nanobot contributors"]
description = "AI Agent tools implementation for file system and shell operations"
license = "MIT"

[dependencies]
async-trait = "0.1"
serde.workspace = true
serde_json = "1"
thiserror.workspace = true
tokio = { workspace = true, features = ["rt", "macros", "process", "fs", "time"] }
tracing.workspace = true
anyhow.workspace = true
schemars = "0.8"
tokio-util = "0.7"
walkdir = "2"

[dev-dependencies]
tempfile = "3"
