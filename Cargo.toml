[workspace]
members = ["crates/*"]

resolver = "3"

[workspace.dependencies]
anyhow = "1"
thiserror = "2"
tracing = "0.1"
nanobot_config.path = "crates/config"
nanobot_provider.path = "crates/provider"
nanobot_agent.path = "crates/agent"
[workspace.dependencies.tokio]
version = "1"
features = ["rt-multi-thread", "macros", "sync"]
[workspace.dependencies.serde]
version = "1"
features = ["derive"]
[workspace.dependencies.clap]
version = "4"
features = ["derive"]
[workspace.dependencies.tracing-subscriber]
version = "0.3"
features = ["env-filter"]
[workspace.dependencies.dialoguer]
version = "0.11"
[workspace.dependencies.dirs]
version = "6"
