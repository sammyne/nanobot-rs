name: auto-tag

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # 2. 提取最新提交消息
      - name: Get commit message
        id: commit-info
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          COMMIT_SHA=$(git rev-parse HEAD)
          COMMIT_SHA_SHORT=$(git rev-parse --short HEAD)
          
          echo "commit_msg=${COMMIT_MSG}" >> $GITHUB_OUTPUT
          echo "commit_sha=${COMMIT_SHA}" >> $GITHUB_OUTPUT
          echo "commit_sha_short=${COMMIT_SHA_SHORT}" >> $GITHUB_OUTPUT
          
          echo "=========================================="
          echo "提交信息"
          echo "=========================================="
          echo "Commit SHA: ${COMMIT_SHA}"
          echo "Commit 消息: ${COMMIT_MSG}"
          echo "=========================================="
      
      # 3. 检测 bump v{version} 模式并提取版本号
      - name: Detect and extract version
        id: version-info
        run: |
          COMMIT_MSG="${{ steps.commit-info.outputs.commit_msg }}"
          
          # 检测 bump v{version} 模式，支持语义化版本格式
          # 匹配: bump v1.0.0, bump v2.1.3, bump v0.0.1 等
          VERSION_PATTERN="bump v([0-9]+\.[0-9]+\.[0-9]+)"
          
          if [[ "$COMMIT_MSG" =~ $VERSION_PATTERN ]]; then
            VERSION="v${BASH_REMATCH[1]}"
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "matched=true" >> $GITHUB_OUTPUT
            
            echo "=========================================="
            echo "✅ 检测到版本发布提交"
            echo "=========================================="
            echo "提取的版本号: ${VERSION}"
            echo "=========================================="
          else
            echo "matched=false" >> $GITHUB_OUTPUT
            
            echo "=========================================="
            echo "ℹ️  提交消息不包含 bump v{version} 模式"
            echo "=========================================="
            echo "跳过自动打 tag 流程"
            echo "=========================================="
          fi
      
      # 4. 验证版本号并检查 tag 是否已存在
      - name: Validate version and check tag existence
        id: validate
        if: steps.version-info.outputs.matched == 'true'
        run: |
          VERSION="${{ steps.version-info.outputs.version }}"
          
          echo "=========================================="
          echo "版本号验证"
          echo "=========================================="
          
          # 验证版本号格式（语义化版本：v主.次.补丁）
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::版本号格式无效: ${VERSION}"
            echo ""
            echo "期望格式: v主.次.补丁（如 v1.0.0、v2.1.3）"
            echo "实际格式: ${VERSION}"
            exit 1
          fi
          
          echo "✅ 版本号格式有效: ${VERSION}"
          
          # 检查 tag 是否已存在
          if git tag -l | grep -q "^${VERSION}$"; then
            echo "::warning::Tag ${VERSION} 已存在于仓库中"
            echo ""
            echo "为避免重复创建，工作流将终止"
            exit 1
          fi
          
          echo "✅ Tag ${VERSION} 不存在，可以创建"
          echo "=========================================="
      
      # 5. 配置 Git 用户信息
      - name: Configure Git user
        if: steps.version-info.outputs.matched == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          echo "✅ Git 用户配置完成"
          echo "  用户名: github-actions[bot]"
          echo "  邮箱: github-actions[bot]@users.noreply.github.com"
      
      # 6. 创建并推送 tag（带重试机制）
      - name: Create and push tag
        if: steps.version-info.outputs.matched == 'true'
        run: |
          VERSION="${{ steps.version-info.outputs.version }}"
          COMMIT_SHA="${{ steps.commit-info.outputs.commit_sha }}"
          
          echo "=========================================="
          echo "创建并推送 Tag"
          echo "=========================================="
          echo "Tag 名称: ${VERSION}"
          echo "关联 Commit: ${COMMIT_SHA}"
          echo "=========================================="
          
          # 创建轻量级 tag
          git tag "${VERSION}" "${COMMIT_SHA}"
          echo "✅ Tag ${VERSION} 创建成功"
          
          # 推送 tag 到远程仓库（带重试机制，最多 3 次）
          MAX_RETRIES=3
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo ""
            echo "正在推送 tag（尝试 ${RETRY_COUNT}/${MAX_RETRIES}）..."
            
            if git push origin "${VERSION}" 2>&1; then
              echo ""
              echo "=========================================="
              echo "✅ Tag 推送成功！"
              echo "=========================================="
              echo "Tag 名称: ${VERSION}"
              echo "Commit SHA: ${COMMIT_SHA}"
              echo "查看地址: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${VERSION}"
              echo "=========================================="
              exit 0
            else
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "::warning::Tag 推送失败，等待 5 秒后重试..."
                sleep 5
              fi
            fi
          done
          
          # 所有重试均失败
          echo ""
          echo "::error::Tag 推送失败，已重试 ${MAX_RETRIES} 次"
          echo ""
          echo "可能的原因："
          echo "  1. 网络连接问题"
          echo "  2. GITHUB_TOKEN 权限不足"
          echo ""
          echo "请检查以下配置："
          echo "  - 仓库 Settings > Actions > General > Workflow permissions"
          echo "  - 确保选择了 'Read and write permissions' 或工作流具有 'contents: write' 权限"
          exit 1
