name: auto-tag

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（可选，不填则从最新 commit message 中提取）'
        required: false
        type: string

permissions:
  contents: write
  actions: write

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      # 2. 提取最新提交消息
      - name: Get commit message
        id: commit-info
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          COMMIT_SHA=$(git rev-parse HEAD)
          COMMIT_SHA_SHORT=$(git rev-parse --short HEAD)
          
          echo "commit_msg=${COMMIT_MSG}" >> $GITHUB_OUTPUT
          echo "commit_sha=${COMMIT_SHA}" >> $GITHUB_OUTPUT
          echo "commit_sha_short=${COMMIT_SHA_SHORT}" >> $GITHUB_OUTPUT
          
          echo "=========================================="
          echo "提交信息"
          echo "=========================================="
          echo "触发方式: ${{ github.event_name }}"
          echo "Commit SHA: ${COMMIT_SHA}"
          echo "Commit 消息: ${COMMIT_MSG}"
          echo "=========================================="
      
      # 3. 检测 bump v{version} 模式并提取版本号
      - name: Detect and extract version
        id: version-info
        run: |
          # 优先使用手动触发时输入的版本号
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "matched=true" >> $GITHUB_OUTPUT
            
            echo "=========================================="
            echo "✅ 手动触发模式"
            echo "=========================================="
            echo "输入的版本号: ${VERSION}"
            echo "=========================================="
          else
            # 从 commit message 中提取版本号
            COMMIT_MSG="${{ steps.commit-info.outputs.commit_msg }}"
            
            # 检测 bump v{version} 模式，支持语义化版本格式
            # 匹配: bump v1.0.0, bump v2.1.3, bump v0.0.1 等
            VERSION_PATTERN="bump v([0-9]+\\.[0-9]+\\.[0-9]+)"
            
            if [[ "$COMMIT_MSG" =~ $VERSION_PATTERN ]]; then
              VERSION="${BASH_REMATCH[1]}"
              echo "version=${VERSION}" >> $GITHUB_OUTPUT
              echo "matched=true" >> $GITHUB_OUTPUT
              
              echo "=========================================="
              echo "✅ 检测到版本发布提交"
              echo "=========================================="
              echo "提取的版本号: ${VERSION}"
              echo "=========================================="
            else
              echo "matched=false" >> $GITHUB_OUTPUT
              
              echo "=========================================="
              echo "ℹ️  提交消息不包含 bump v{version} 模式"
              echo "=========================================="
              echo "跳过自动打 tag 流程"
              echo "=========================================="
            fi
          fi      
      # 4. 验证版本号并检查 tag 是否已存在
      - name: Validate version and check tag existence
        id: validate
        if: steps.version-info.outputs.matched == 'true'
        run: |
          VERSION="${{ steps.version-info.outputs.version }}"
          
          echo "=========================================="
          echo "版本号验证"
          echo "=========================================="
          
          # 验证版本号格式（语义化版本：主.次.补丁）
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::版本号格式无效: ${VERSION}"
            echo ""
            echo "期望格式: 主.次.补丁（如 1.0.0、2.1.3）"
            echo "实际格式: ${VERSION}"
            exit 1
          fi
          
          echo "✅ 版本号格式有效: ${VERSION}"
          
          # 检查 tag 是否已存在
          if git tag -l | grep -q "^${VERSION}$"; then
            echo "::warning::Tag ${VERSION} 已存在于仓库中"
            echo ""
            echo "为避免重复创建，工作流将终止"
            exit 1
          fi
          
          echo "✅ Tag ${VERSION} 不存在，可以创建"
          echo "=========================================="
      
      # 5. 校验 tag 版本与 Cargo.toml 一致性
      - name: Validate version consistency with Cargo.toml
        id: cargo-validate
        if: steps.version-info.outputs.matched == 'true'
        run: |
          VERSION="${{ steps.version-info.outputs.version }}"
          
          echo "=========================================="
          echo "Cargo.toml 版本一致性校验"
          echo "=========================================="
          
          # 从 crates/nanobot/Cargo.toml 提取版本号
          CARGO_VERSION=$(grep -m 1 '^version = ' crates/nanobot/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          
          if [ -z "$CARGO_VERSION" ]; then
            echo "::error::无法从 crates/nanobot/Cargo.toml 提取版本号"
            exit 1
          fi
          
          echo "Tag 版本号: ${VERSION}"
          echo "Cargo.toml 版本号: ${CARGO_VERSION}"
          
          if [ "$VERSION" != "$CARGO_VERSION" ]; then
            echo ""
            echo "::error::版本号不一致！"
            echo ""
            echo "Tag 版本 (${VERSION}) 与 crates/nanobot/Cargo.toml 中的版本 (${CARGO_VERSION}) 不匹配"
            echo ""
            echo "请确保提交消息中的版本号与 Cargo.toml 中的版本一致："
            echo "  1. 更新 crates/nanobot/Cargo.toml 中的 version = \"${VERSION}\""
            echo "  2. 或者使用正确的版本号: bump v${CARGO_VERSION}"
            exit 1
          fi
          
          echo ""
          echo "✅ 版本一致性校验通过"
          echo "=========================================="
      
      # 6. 配置 Git 用户信息
      - name: Configure Git user
        if: steps.version-info.outputs.matched == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          echo "✅ Git 用户配置完成"
          echo "  用户名: github-actions[bot]"
          echo "  邮箱: github-actions[bot]@users.noreply.github.com"
      
      # 7. 创建并推送 tag（带重试机制）
      - name: Create and push tag
        id: push-tag
        if: steps.version-info.outputs.matched == 'true'
        run: |
          VERSION="${{ steps.version-info.outputs.version }}"
          COMMIT_SHA="${{ steps.commit-info.outputs.commit_sha }}"
          
          echo "=========================================="
          echo "创建并推送 Tag"
          echo "=========================================="
          echo "Tag 名称: ${VERSION}"
          echo "关联 Commit: ${COMMIT_SHA}"
          echo "=========================================="
          
          # 创建轻量级 tag
          git tag "${VERSION}" "${COMMIT_SHA}"
          echo "✅ Tag ${VERSION} 创建成功"
          
          # 推送 tag 到远程仓库（带重试机制，最多 3 次）
          MAX_RETRIES=3
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo ""
            echo "正在推送 tag（尝试 ${RETRY_COUNT}/${MAX_RETRIES}）..."
            
          if git push origin "${VERSION}" 2>&1; then
              echo ""
              echo "=========================================="
              echo "✅ Tag 推送成功！"
              echo "=========================================="
              echo "Tag 名称: ${VERSION}"
              echo "Commit SHA: ${COMMIT_SHA}"
              echo "查看地址: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${VERSION}"
              echo "=========================================="
              
              # 保存 tag 名称供后续步骤使用
              echo "tag_name=${VERSION}" >> $GITHUB_OUTPUT
              exit 0
            else
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "::warning::Tag 推送失败，等待 5 秒后重试..."
                sleep 5
              fi
            fi
          done
          
          # 所有重试均失败
          echo ""
          echo "::error::Tag 推送失败，已重试 ${MAX_RETRIES} 次"
          echo ""
          echo "可能的原因："
          echo "  1. 网络连接问题"
          echo "  2. GITHUB_TOKEN 权限不足"
          echo ""
          echo "请检查以下配置："
          echo "  - 仓库 Settings > Actions > General > Workflow permissions"
          echo "  - 确保选择了 'Read and write permissions' 或工作流具有 'contents: write' 权限"
          exit 1
      
      # 8. 触发 release workflow
      - name: Trigger release workflow
        if: steps.version-info.outputs.matched == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.version-info.outputs.version }}';
            
            console.log('==========================================');
            console.log('触发 release workflow');
            console.log('==========================================');
            console.log('Tag 版本:', version);
            console.log('==========================================');
            
            try {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'release.yml',
                ref: version,
                inputs: {
                  tag: version
                }
              });
              console.log('✅ release workflow 触发成功');
            } catch (error) {
              console.error('❌ 触发 release workflow 失败:', error.message);
              throw error;
            }
