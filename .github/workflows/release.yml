name: release

on:
  # Git Tag 推送触发
  push:
    tags:
      - '*'
  
  # 手动触发
  workflow_dispatch:
    inputs:
      tag:
        description: '镜像标签前缀（未填写则使用 {nanobot crate 版本}-{git commit id}）'
        required: false
        default: ''
  
  # 被其他 workflow 调用
  workflow_call:
    inputs:
      tag:
        description: '镜像标签前缀'
        required: true
        type: string

env:
  # 启用 BuildKit
  DOCKER_BUILDKIT: 1
  # 镜像仓库地址
  REGISTRY: registry.cn-hangzhou.aliyuncs.com
  IMAGE_NAME: sammyne/nanobot

jobs:
  # 验证job：版本校验、参数校验、secrets检查
  validate:
    runs-on: ubuntu-24.04
    outputs:
      tag_prefix: ${{ steps.image-tag.outputs.tag_prefix }}
      image_tag: ${{ steps.image-tag.outputs.image_tag }}
      full_image: ${{ steps.image-tag.outputs.full_image }}
    
    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v6
      
      # 2. 版本一致性校验（仅在 Git Tag 触发时执行）
      - name: Verify version consistency
        if: github.event_name == 'push'
        run: |
          # 从 Git Tag 中提取版本号（Tag 格式为 0.1.1，无需去除前缀）
          TAG_VERSION="${GITHUB_REF#refs/tags/}"
          
          # 从 Cargo.toml 中提取 package.version
          CARGO_VERSION=$(grep -E '^version\s*=' crates/cli/Cargo.toml | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          
          echo "=========================================="
          echo "版本一致性校验"
          echo "=========================================="
          echo "Git Tag 版本: ${TAG_VERSION}"
          echo "Cargo.toml 版本: ${CARGO_VERSION}"
          echo "=========================================="
          
          # 比较版本号
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::版本不一致！Git Tag 版本 (${TAG_VERSION}) 与 Cargo.toml 版本 (${CARGO_VERSION}) 不匹配"
            echo ""
            echo "请确保 Git Tag 与 crates/cli/Cargo.toml 中的 package.version 保持一致"
            exit 1
          fi
          
          echo "✅ 版本一致性校验通过"
      
      # 3. 手动触发或被调用时输出提示信息
      - name: Skip version verification notice
        if: github.event_name != 'push'
        run: |
          echo "=========================================="
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ℹ️  手动触发模式：已跳过版本一致性校验"
          else
            echo "ℹ️  被 workflow_call 调用：已跳过版本一致性校验"
          fi
          echo "=========================================="
      
      # 4. 预检查 Secrets 配置
      - name: Check Secrets configuration
        run: |
          if [ -z "${{ secrets.ACR_PASSWORD }}" ]; then
            echo "::error::ACR_PASSWORD Secret 未配置！"
            echo ""
            echo "请在 GitHub 仓库设置中配置以下 Secret："
            echo "  路径: Settings > Secrets and variables > Actions > New repository secret"
            echo "  名称: ACR_PASSWORD"
            echo "  值: 阿里云容器镜像服务密码"
            echo ""
            echo "参考文档: https://help.github.com/en/actions/security-guides/encrypted-secrets"
            exit 1
          fi
          echo "✅ ACR_PASSWORD 已配置"
      
      # 5. 获取 Git 提交短哈希
      - name: Get Git commit short SHA
        id: git-info
        run: |
          COMMIT_SHA=$(git rev-parse --short HEAD)
          if [ -z "$COMMIT_SHA" ]; then
            echo "::error::无法获取 Git commit ID"
            exit 1
          fi
          echo "commit_sha=${COMMIT_SHA}" >> $GITHUB_OUTPUT
          echo "✅ Git Commit ID: ${COMMIT_SHA}"
      
      # 6. 确定镜像标签
      - name: Determine image tag
        id: image-tag
        run: |
          # 根据触发方式确定 tag 前缀
          if [ "${{ github.event_name }}" = "push" ]; then
            # Tag 触发：从 ref 中提取 tag 名称（去除 refs/tags/ 前缀）
            TAG_PREFIX="${GITHUB_REF#refs/tags/}"
          elif [ "${{ github.event_name }}" = "workflow_call" ]; then
            # 被其他 workflow 调用：使用传入的 tag 参数
            TAG_PREFIX="${{ inputs.tag }}"
          else
            # 手动触发：使用输入参数，未填写则从 Cargo.toml 获取版本号
            TAG_PREFIX="${{ github.event.inputs.tag }}"
            if [ -z "$TAG_PREFIX" ]; then
              # 从 crates/nanobot/Cargo.toml 中提取 package.version
              TAG_PREFIX=$(grep -E '^version\s*=' crates/nanobot/Cargo.toml | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
              echo "ℹ️  未指定 tag，使用 Cargo.toml 版本号: ${TAG_PREFIX}"
            fi
          fi
          
          # 组合完整标签：${tag}-${commit-id}
          IMAGE_TAG="${TAG_PREFIX}-${{ steps.git-info.outputs.commit_sha }}"
          
          echo "tag_prefix=${TAG_PREFIX}" >> $GITHUB_OUTPUT
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "full_image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}" >> $GITHUB_OUTPUT
          
          echo "=========================================="
          echo "镜像构建信息"
          echo "=========================================="
          echo "Tag 前缀: ${TAG_PREFIX}"
          echo "Commit ID: ${{ steps.git-info.outputs.commit_sha }}"
          echo "镜像标签: ${IMAGE_TAG}"
          echo "完整镜像: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
          echo "=========================================="

  # AMD64 构建job
  build-amd64:
    runs-on: ubuntu-24.04
    needs: validate
    outputs:
      digest: ${{ steps.get-digest.outputs.digest }}
    
    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v6
      
      # 2. 登录阿里云镜像仓库
      - name: Login to Alibaba Cloud Container Registry
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login \
            --username "黎康鲤" \
            --password-stdin \
            ${{ env.REGISTRY }}
      
      # 3. 设置 Docker Buildx（支持缓存导出）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      
      # 4. 构建并推送 AMD64 镜像
      - name: Build and push AMD64 Docker image
        id: build-amd64
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:amd64-${{ needs.validate.outputs.image_tag }}
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,scope=amd64,mode=max
      
      # 5. 获取镜像 digest
      - name: Get image digest
        id: get-digest
        run: |
          echo "=========================================="
          echo "获取 AMD64 镜像 Digest"
          echo "=========================================="
          
          DIGEST=$(docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:amd64-${{ needs.validate.outputs.image_tag }} 2>/dev/null | jq -r '.manifests[0].digest' || echo "")
          if [ -z "$DIGEST" ]; then
            echo "::error::无法获取 AMD64 镜像的 digest"
            exit 1
          fi
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT
          echo "  AMD64 Digest: ${DIGEST}"
          echo "✅ 镜像 digest 获取完成"
          echo "=========================================="
      
      # 6. 登出镜像仓库（清理凭证）
      - name: Logout from Container Registry
        if: always()
        run: docker logout ${{ env.REGISTRY }}
      
      # 7. 输出构建结果
      - name: Build summary
        if: success()
        run: |
          echo ""
          echo "=========================================="
          echo "✅ AMD64 构建成功！"
          echo "=========================================="
          echo "镜像已推送至："
          echo "  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:amd64-${{ needs.validate.outputs.image_tag }}"
          echo "  Digest: ${{ steps.get-digest.outputs.digest }}"
          echo "=========================================="

  # ARM64 构建job
  build-arm64:
    runs-on: ubuntu-24.04-arm
    needs: validate
    outputs:
      digest: ${{ steps.get-digest.outputs.digest }}
    
    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v6
      
      # 2. 登录阿里云镜像仓库
      - name: Login to Alibaba Cloud Container Registry
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login \
            --username "黎康鲤" \
            --password-stdin \
            ${{ env.REGISTRY }}
      
      # 3. 设置 Docker Buildx（支持缓存导出）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      
      # 4. 构建并推送 ARM64 镜像
      - name: Build and push ARM64 Docker image
        id: build-arm64
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/arm64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:arm64-${{ needs.validate.outputs.image_tag }}
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,scope=arm64,mode=max
      
      # 5. 获取镜像 digest
      - name: Get image digest
        id: get-digest
        run: |
          echo "=========================================="
          echo "获取 ARM64 镜像 Digest"
          echo "=========================================="
          
          DIGEST=$(docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:arm64-${{ needs.validate.outputs.image_tag }} 2>/dev/null | jq -r '.manifests[0].digest' || echo "")
          if [ -z "$DIGEST" ]; then
            echo "::error::无法获取 ARM64 镜像的 digest"
            exit 1
          fi
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT
          echo "  ARM64 Digest: ${DIGEST}"
          echo "✅ 镜像 digest 获取完成"
          echo "=========================================="
      
      # 6. 登出镜像仓库（清理凭证）
      - name: Logout from Container Registry
        if: always()
        run: docker logout ${{ env.REGISTRY }}
      
      # 7. 输出构建结果
      - name: Build summary
        if: success()
        run: |
          echo ""
          echo "=========================================="
          echo "✅ ARM64 构建成功！"
          echo "=========================================="
          echo "镜像已推送至："
          echo "  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:arm64-${{ needs.validate.outputs.image_tag }}"
          echo "  Digest: ${{ steps.get-digest.outputs.digest }}"
          echo ""
          echo "构建环境："
          echo "  Runner: Ubuntu-24.04-arm (原生 ARM64 环境)"
          echo "  Platform: linux/arm64"
          echo "  适用平台: ARM64 Linux 服务器 / Apple Silicon Mac (Docker Desktop)"
          echo "=========================================="

  # 创建并推送多架构manifest
  create-manifest:
    runs-on: ubuntu-24.04
    needs: [validate, build-amd64, build-arm64]
    
    steps:
      # 1. 登录阿里云镜像仓库
      - name: Login to Alibaba Cloud Container Registry
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login \
            --username "黎康鲤" \
            --password-stdin \
            ${{ env.REGISTRY }}
      
      # 2. 删除已存在的 manifest（避免冲突）
      - name: Remove existing manifest
        run: |
          echo "=========================================="
          echo "清理已存在的 Manifest"
          echo "=========================================="
          
          # 删除主 manifest（如果存在）
          docker manifest rm --force ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.validate.outputs.image_tag }} 2>/dev/null || echo "  主 manifest 不存在或已删除"
          
          echo ""
          echo "✅ Manifest 清理完成"
          echo "=========================================="
      
      # 3. 创建并推送多架构manifest
      - name: Create and push multi-architecture manifest
        run: |
          echo "=========================================="
          echo "创建多架构Manifest（使用 Digest）"
          echo "=========================================="
          
          echo ""
          echo "AMD64 镜像:"
          echo "  标签: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:amd64-${{ needs.validate.outputs.image_tag }}"
          echo "  Digest: ${{ needs.build-amd64.outputs.digest }}"
          echo ""
          echo "ARM64 镜像:"
          echo "  标签: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:arm64-${{ needs.validate.outputs.image_tag }}"
          echo "  Digest: ${{ needs.build-arm64.outputs.digest }}"
          echo ""
          
          echo ""
          echo "创建多架构 Manifest（使用 Digest）..."
          # 使用 digest 创建 manifest，避免标签冲突
          docker manifest create ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.validate.outputs.image_tag }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-amd64.outputs.digest }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-arm64.outputs.digest }}
          
          # 推送manifest
          docker manifest push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.validate.outputs.image_tag }}
          
          echo ""
          echo "✅ 多架构Manifest创建并推送成功"
          echo "=========================================="
      
      # 4. 登出镜像仓库（清理凭证）
      - name: Logout from Container Registry
        if: always()
        run: docker logout ${{ env.REGISTRY }}
      
      # 6. 输出构建结果
      - name: Build summary
        if: success()
        run: |
          echo ""
          echo "=========================================="
          echo "✅ 构建成功！"
          echo "=========================================="
          echo "多架构镜像已推送至："
          echo "  ${{ needs.validate.outputs.full_image }}"
          echo ""
          echo "支持架构："
          echo "  - linux/amd64 (x86-64) - 在 Ubuntu-24.04 上构建"
          echo "  - linux/arm64 (aarch64) - 在 Ubuntu-24.04-arm (原生 ARM64 环境) 上构建"
          echo ""
          echo "适用平台："
          echo "  - AMD64: x86_64 Linux 服务器"
          echo "  - ARM64: ARM64 Linux 服务器 / Apple Silicon Mac (Docker Desktop)"
          echo ""
          echo "拉取命令："
          echo "  docker pull ${{ needs.validate.outputs.full_image }}"
          echo ""
          echo "查看镜像架构："
          echo "  docker manifest inspect ${{ needs.validate.outputs.full_image }}"
          echo ""
          echo "架构特定标签（用于调试）："
          echo "  AMD64: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:amd64-${{ needs.validate.outputs.image_tag }}"
          echo "  ARM64: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:arm64-${{ needs.validate.outputs.image_tag }}"
          echo "=========================================="

  # 更新 CHANGELOG.md 并创建 GitHub Release
  update-changelog:
    runs-on: ubuntu-24.04
    needs: [validate, create-manifest]
    # 仅在 Git Tag 推送时执行
    if: github.event_name == 'push'
    permissions:
      contents: write
    
    steps:
      # 1. 检出代码（完整历史，用于生成 changelog）
      - name: Checkout repository with full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      # 2. 生成 CHANGELOG 内容
      - name: Generate CHANGELOG
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag ${{ github.ref_name }}
        env:
          OUTPUT: CHANGELOG.md
      
      # 3. 检查生成的 changelog 内容
      - name: Check changelog content
        id: check-changelog
        run: |
          echo "=========================================="
          echo "检查 Changelog 内容"
          echo "=========================================="
          
          CHANGELOG_CONTENT="${{ steps.changelog.outputs.content }}"
          
          if [ -z "$CHANGELOG_CONTENT" ] || [ "$CHANGELOG_CONTENT" = "" ]; then
            echo "⚠️  未检测到变更内容，将生成默认的 'No changes' 消息"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            CHANGELOG_CONTENT="## [${{ github.ref_name }}] - $(date +%Y-%m-%d)\n\nNo changes in this release."
          else
            echo "✅ 检测到变更内容"
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo ""
            echo "变更内容预览："
            echo "----------------------------------------"
            echo "$CHANGELOG_CONTENT" | head -20
            echo "----------------------------------------"
          fi
          
          # 将内容保存到文件供后续步骤使用
          echo "$CHANGELOG_CONTENT" > /tmp/release_notes.md
          echo "=========================================="
      
      # 4. 更新 CHANGELOG.md 文件
      - name: Update CHANGELOG.md
        run: |
          echo "=========================================="
          echo "更新 CHANGELOG.md 文件"
          echo "=========================================="
          
          # 检查 CHANGELOG.md 是否存在
          if [ -f "CHANGELOG.md" ]; then
            echo "📄 CHANGELOG.md 已存在，将在顶部插入新内容"
            # 备份现有文件
            cp CHANGELOG.md CHANGELOG.md.backup
            
            # 创建新内容（新版本 + 旧内容）
            {
              cat /tmp/release_notes.md
              echo ""
              echo ""
              # 移除旧文件的头部说明（如果存在），保留版本历史
              tail -n +5 CHANGELOG.md.backup
            } > CHANGELOG.md.new
            
            mv CHANGELOG.md.new CHANGELOG.md
            rm CHANGELOG.md.backup
          else
            echo "📄 CHANGELOG.md 不存在，将创建新文件"
            # 创建标准头部
            {
              echo "# Changelog"
              echo ""
              echo "All notable changes to this project will be documented in this file."
              echo ""
              echo "The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),"
              echo "and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html)."
              echo ""
              cat /tmp/release_notes.md
            } > CHANGELOG.md
          fi
          
          echo ""
          echo "✅ CHANGELOG.md 更新完成"
          echo ""
          echo "文件内容预览："
          echo "----------------------------------------"
          head -30 CHANGELOG.md
          echo "----------------------------------------"
          echo "=========================================="
      
      # 5. 配置 Git 用户信息
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      # 6. 提交并推送 CHANGELOG.md（带重试机制）
      - name: Commit and push CHANGELOG.md
        id: push-changelog
        run: |
          echo "=========================================="
          echo "提交并推送 CHANGELOG.md"
          echo "=========================================="
          
          # 检查是否有变更
          if git diff --quiet CHANGELOG.md; then
            echo "ℹ️  CHANGELOG.md 无变更，跳过提交"
            echo "commit_sha=none" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # 添加文件到暂存区
          git add CHANGELOG.md
          
          # 创建提交
          COMMIT_MSG="chore: update CHANGELOG.md for ${{ github.ref_name }}"
          git commit -m "$COMMIT_MSG"
          
          # 推送（带重试机制，最多 3 次）
          MAX_RETRIES=3
          RETRY_COUNT=0
          PUSH_SUCCESS=false
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo ""
            echo "尝试推送 (第 ${RETRY_COUNT}/${MAX_RETRIES} 次)..."
            
            if git push origin HEAD:main; then
              PUSH_SUCCESS=true
              break
            else
              echo "⚠️  推送失败"
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "等待 5 秒后重试..."
                sleep 5
                # 拉取最新变更并重新应用
                git pull --rebase origin main
              fi
            fi
          done
          
          if [ "$PUSH_SUCCESS" = false ]; then
            echo "::error::推送 CHANGELOG.md 失败，已达到最大重试次数"
            exit 1
          fi
          
          # 获取提交 SHA
          COMMIT_SHA=$(git rev-parse HEAD)
          echo "commit_sha=${COMMIT_SHA}" >> $GITHUB_OUTPUT
          
          echo ""
          echo "✅ CHANGELOG.md 推送成功"
          echo "  Commit SHA: ${COMMIT_SHA}"
          echo "  Commit Message: ${COMMIT_MSG}"
          echo "=========================================="
      
      # 7. 创建 GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      # 8. 输出执行结果
      - name: Summary
        if: success()
        run: |
          echo ""
          echo "=========================================="
          echo "✅ Changelog 更新和 Release 创建成功！"
          echo "=========================================="
          echo ""
          echo "版本: ${{ github.ref_name }}"
          echo ""
          echo "CHANGELOG.md:"
          if [ "${{ steps.push-changelog.outputs.commit_sha }}" != "none" ]; then
            echo "  ✅ 已更新并推送到仓库"
            echo "  Commit: ${{ steps.push-changelog.outputs.commit_sha }}"
          else
            echo "  ℹ️  无变更，未创建新提交"
          fi
          echo ""
          echo "GitHub Release:"
          echo "  ✅ 已创建"
          echo "  URL: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          echo ""
          echo "=========================================="