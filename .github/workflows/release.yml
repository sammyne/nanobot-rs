name: release

on:
  # Git Tag 推送触发
  push:
    tags:
      - '*'
  
  # 手动触发
  workflow_dispatch:
    inputs:
      tag:
        description: '镜像标签前缀（未填写则使用 {main 分支最新的 tag}-{git commit id}）'
        required: false
        default: ''
  
  # 被其他 workflow 调用
  workflow_call:
    inputs:
      tag:
        description: '镜像标签前缀'
        required: true
        type: string

env:
  # 启用 BuildKit
  DOCKER_BUILDKIT: 1
  # 镜像仓库地址
  REGISTRY: registry.cn-hangzhou.aliyuncs.com
  IMAGE_NAME: sammyne/nanobot

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v6
      
      # 2. 版本一致性校验（仅在 Git Tag 触发时执行）
      - name: Verify version consistency
        if: github.event_name == 'push'
        run: |
          # 从 Git Tag 中提取版本号（Tag 格式为 0.1.1，无需去除前缀）
          TAG_VERSION="${GITHUB_REF#refs/tags/}"
          
          # 从 Cargo.toml 中提取 package.version
          CARGO_VERSION=$(grep -E '^version\s*=' crates/cli/Cargo.toml | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          
          echo "=========================================="
          echo "版本一致性校验"
          echo "=========================================="
          echo "Git Tag 版本: ${TAG_VERSION}"
          echo "Cargo.toml 版本: ${CARGO_VERSION}"
          echo "=========================================="
          
          # 比较版本号
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::版本不一致！Git Tag 版本 (${TAG_VERSION}) 与 Cargo.toml 版本 (${CARGO_VERSION}) 不匹配"
            echo ""
            echo "请确保 Git Tag 与 crates/cli/Cargo.toml 中的 package.version 保持一致"
            exit 1
          fi
          
          echo "✅ 版本一致性校验通过"
      
      # 3. 手动触发或被调用时输出提示信息
      - name: Skip version verification notice
        if: github.event_name != 'push'
        run: |
          echo "=========================================="
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ℹ️  手动触发模式：已跳过版本一致性校验"
          else
            echo "ℹ️  被 workflow_call 调用：已跳过版本一致性校验"
          fi
          echo "=========================================="
      
      # 4. 预检查 Secrets 配置
      - name: Check Secrets configuration
        run: |
          if [ -z "${{ secrets.ACR_PASSWORD }}" ]; then
            echo "::error::ACR_PASSWORD Secret 未配置！"
            echo ""
            echo "请在 GitHub 仓库设置中配置以下 Secret："
            echo "  路径: Settings > Secrets and variables > Actions > New repository secret"
            echo "  名称: ACR_PASSWORD"
            echo "  值: 阿里云容器镜像服务密码"
            echo ""
            echo "参考文档: https://help.github.com/en/actions/security-guides/encrypted-secrets"
            exit 1
          fi
          echo "✅ ACR_PASSWORD 已配置"
      
      # 5. 获取 Git 提交短哈希
      - name: Get Git commit short SHA
        id: git-info
        run: |
          COMMIT_SHA=$(git rev-parse --short HEAD)
          if [ -z "$COMMIT_SHA" ]; then
            echo "::error::无法获取 Git commit ID"
            exit 1
          fi
          echo "commit_sha=${COMMIT_SHA}" >> $GITHUB_OUTPUT
          echo "✅ Git Commit ID: ${COMMIT_SHA}"
      
      # 6. 确定镜像标签
      - name: Determine image tag
        id: image-tag
        run: |
          # 根据触发方式确定 tag 前缀
          if [ "${{ github.event_name }}" = "push" ]; then
            # Tag 触发：从 ref 中提取 tag 名称（去除 refs/tags/ 前缀）
            TAG_PREFIX="${GITHUB_REF#refs/tags/}"
          elif [ "${{ github.event_name }}" = "workflow_call" ]; then
            # 被其他 workflow 调用：使用传入的 tag 参数
            TAG_PREFIX="${{ inputs.tag }}"
          else
            # 手动触发：使用输入参数，未填写则获取 main 分支最新的 tag
            TAG_PREFIX="${{ github.event.inputs.tag }}"
            if [ -z "$TAG_PREFIX" ]; then
              # 获取所有 tags
              git fetch --tags
              # 获取 main 分支最新的 tag
              TAG_PREFIX=$(git describe --tags --abbrev=0 origin/main 2>/dev/null || echo "v0.0.0")
              echo "ℹ️  未指定 tag，使用 main 分支最新 tag: ${TAG_PREFIX}"
            fi
          fi
          
          # 组合完整标签：${tag}-${commit-id}
          IMAGE_TAG="${TAG_PREFIX}-${{ steps.git-info.outputs.commit_sha }}"
          
          echo "tag_prefix=${TAG_PREFIX}" >> $GITHUB_OUTPUT
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "full_image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}" >> $GITHUB_OUTPUT
          
          echo "=========================================="
          echo "镜像构建信息"
          echo "=========================================="
          echo "Tag 前缀: ${TAG_PREFIX}"
          echo "Commit ID: ${{ steps.git-info.outputs.commit_sha }}"
          echo "镜像标签: ${IMAGE_TAG}"
          echo "完整镜像: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
          echo "=========================================="
      
      # 7. 登录阿里云镜像仓库
      - name: Login to Alibaba Cloud Container Registry
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login \
            --username "黎康鲤" \
            --password-stdin \
            ${{ env.REGISTRY }}
      
      # 8. 设置 Docker Buildx（支持高级缓存特性）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      
      # 9. 构建并推送镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.image-tag.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      # 10. 登出镜像仓库（清理凭证）
      - name: Logout from Container Registry
        if: always()
        run: docker logout ${{ env.REGISTRY }}
      
      # 11. 输出构建结果
      - name: Build summary
        if: success()
        run: |
          echo ""
          echo "=========================================="
          echo "✅ 构建成功！"
          echo "=========================================="
          echo "镜像已推送至："
          echo "  ${{ steps.image-tag.outputs.full_image }}"
          echo ""
          echo "拉取命令："
          echo "  docker pull ${{ steps.image-tag.outputs.full_image }}"
          echo "=========================================="
