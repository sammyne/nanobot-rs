name: release-bin

on:
  # 打 tag 时触发
  push:
    tags:
      - '*'
  # 手动触发
  workflow_dispatch:
    inputs:
      tag:
        description: '要构建的 tag 版本号（不带 v 前缀）'
        required: true
        type: string

permissions:
  contents: write

jobs:
  # 验证版本一致性
  verify-version:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.validate-version.outputs.version }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史以获取所有 tags
      
      - name: Validate tag exists (for manual dispatch)
        id: get-tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "=========================================="
          echo "手动触发：验证指定的 tag"
          echo "=========================================="
          
          TAG_VERSION="${{ github.event.inputs.tag }}"
          echo "指定的 tag: $TAG_VERSION"
          
          # 验证 tag 是否存在
          if ! git tag | grep -q "^${TAG_VERSION}$"; then
            echo "::error::Tag '$TAG_VERSION' 不存在"
            echo ""
            echo "可用的 tags:"
            git tag | head -20
            exit 1
          fi
          
          echo "tag=$TAG_VERSION" >> $GITHUB_OUTPUT
          
          # 切换到该 tag
          git checkout "$TAG_VERSION"
          echo "✅ 已切换到 tag: $TAG_VERSION"
          echo "=========================================="
      
      - name: Validate tag version
        id: validate-version
        run: |
          echo "=========================================="
          echo "验证 Tag 版本与 Cargo.toml 一致性"
          echo "=========================================="
          
          # 提取 Tag 版本号
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_VERSION="${{ steps.get-tag.outputs.tag }}"
          else
            TAG_VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "Tag 版本: $TAG_VERSION"
          
          # 从 Cargo.toml 读取 package.version
          CARGO_VERSION=$(grep -m1 '^version = ' crates/nanobot/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "Cargo.toml 版本: $CARGO_VERSION"
          
          # 比较版本
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo ""
            echo "::error::版本不一致！"
            echo "  Tag 版本: $TAG_VERSION"
            echo "  Cargo.toml 版本: $CARGO_VERSION"
            echo ""
            echo "请确保 tag 版本与 crates/nanobot/Cargo.toml 的 package.version 一致"
            exit 1
          fi
          
          echo ""
          echo "✅ 版本验证通过: $TAG_VERSION"
          echo "version=$TAG_VERSION" >> $GITHUB_OUTPUT
          echo "=========================================="

  # 构建多平台可执行文件
  build:
    needs: verify-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            platform: linux
            arch: x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            platform: windows
            arch: x86_64
            ext: .exe
          - target: x86_64-apple-darwin
            os: macos-26
            platform: macos
            arch: x86_64
          - target: aarch64-apple-darwin
            os: macos-26
            platform: macos
            arch: aarch64
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史以支持手动触发时切换 tag
      
      # 手动触发时切换到指定 tag
      - name: Checkout specified tag (for manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          SPECIFIED_TAG="${{ needs.verify-version.outputs.version }}"
          git checkout "$SPECIFIED_TAG"
          echo "✅ 已切换到 tag: $SPECIFIED_TAG"
      
      # 安装 Rust 工具链
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      # Rust 构建缓存
      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      
      # Linux 平台使用 cargo-chef 优化依赖缓存
      - name: Install cargo-chef (Linux only)
        if: matrix.platform == 'linux'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-chef
      
      - name: Prepare dependencies with cargo-chef (Linux only)
        if: matrix.platform == 'linux'
        run: |
          echo "=========================================="
          echo "使用 cargo-chef 准备依赖"
          echo "=========================================="
          cd crates/nanobot
          cargo chef prepare --recipe-path recipe.json
          cargo chef cook --release --target ${{ matrix.target }} --recipe-path recipe.json
          echo "✅ 依赖准备完成"
          echo "=========================================="
      
      # 构建可执行文件
      - name: Build binary
        run: |
          echo "=========================================="
          echo "构建 ${{ matrix.platform }}-${{ matrix.arch }} 可执行文件"
          echo "=========================================="
          cargo build --release --target ${{ matrix.target }} -p nanobot
          echo "✅ 构建完成"
          echo "=========================================="
      
      # 重命名构建产物
      - name: Rename binary
        id: rename
        shell: bash
        run: |
          VERSION="${{ needs.verify-version.outputs.version }}"
          BINARY_NAME="nanobot-${VERSION}-${{ matrix.arch }}-${{ matrix.platform }}${{ matrix.ext }}"
          
          # 源文件路径
          if [ "${{ matrix.platform }}" = "windows" ]; then
            SOURCE="target/${{ matrix.target }}/release/nanobot.exe"
          else
            SOURCE="target/${{ matrix.target }}/release/nanobot"
          fi
          
          # 重命名
          mv "$SOURCE" "$BINARY_NAME"
          
          echo "binary_name=$BINARY_NAME" >> $GITHUB_OUTPUT
          echo "=========================================="
          echo "构建产物: $BINARY_NAME"
          echo "=========================================="
      
      # 上传构建产物
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.rename.outputs.binary_name }}
          path: ${{ steps.rename.outputs.binary_name }}
          if-no-files-found: error
      
      # 输出构建信息到 Job Summary
      - name: Job Summary
        if: success()
        shell: bash
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ✅ 构建成功" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 平台 | ${{ matrix.platform }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 架构 | ${{ matrix.arch }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 目标 | ${{ matrix.target }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 产物 | \`${{ steps.rename.outputs.binary_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 版本 | ${{ needs.verify-version.outputs.version }} |" >> $GITHUB_STEP_SUMMARY

  # 上传到 GitHub Release
  upload-release:
    needs: [verify-version, build]
    runs-on: ubuntu-24.04
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: false
      
      - name: List artifacts
        run: |
          echo "=========================================="
          echo "构建产物列表"
          echo "=========================================="
          find artifacts -type f -name "nanobot-*" | while read file; do
            echo "  📦 $(basename $file)"
          done
          echo "=========================================="
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify-version.outputs.version }}
          name: ${{ needs.verify-version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: artifacts/**/nanobot-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Job Summary
        if: success()
        run: |
          VERSION="${{ needs.verify-version.outputs.version }}"
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🎉 Release 发布成功" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 发布信息" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 版本 | \`$VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`$VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Release URL | [查看 Release](https://github.com/${{ github.repository }}/releases/tag/$VERSION) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 构建产物" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          find artifacts -type f -name "nanobot-*" | while read file; do
            echo "- \`$(basename $file)\`" >> $GITHUB_STEP_SUMMARY
          done
