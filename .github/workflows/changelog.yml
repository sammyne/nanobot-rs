name: changelog

on:
  # 打 tag 时触发
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  # 创建 GitHub Release
  update-changelog:
    runs-on: ubuntu-24.04
    
    steps:
      # 1. 检出代码（完整历史，用于生成 changelog）
      - name: Checkout repository with full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      # 1.5. 解析 tag 参数
      - name: Resolve tag
        id: resolve-tag
        run: |
          echo "=========================================="
          echo "解析 Tag 参数"
          echo "=========================================="
          
          TAG="${GITHUB_REF#refs/tags/}"
          echo "✅ 使用触发的 Tag: $TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          
          echo "=========================================="
      
      # 1.6. 验证 tag 与 Cargo.toml 版本一致性
      - name: Validate tag version
        id: validate-version
        run: |
          echo "=========================================="
          echo "验证 Tag 版本与 Cargo.toml 一致性"
          echo "=========================================="
          
          TAG="${{ steps.resolve-tag.outputs.tag }}"
          
          # tag 版本号直接使用（不要求 v 前缀）
          TAG_VERSION="$TAG"
          echo "Tag 版本: $TAG_VERSION"
          
          # 从 Cargo.toml 读取 package.version
          CARGO_VERSION=$(grep -m1 '^version = ' crates/nanobot/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "Cargo.toml 版本: $CARGO_VERSION"
          
          # 比较版本
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo ""
            echo "::error::版本不一致！"
            echo "  Tag 版本: $TAG_VERSION"
            echo "  Cargo.toml 版本: $CARGO_VERSION"
            echo ""
            echo "请确保 tag 版本与 crates/nanobot/Cargo.toml 的 package.version 一致"
            exit 1
          fi
          
          echo ""
          echo "✅ 版本验证通过: $TAG_VERSION"
          echo "=========================================="
      
      # 2. 生成 Release Notes（增量变更，仅当前版本）
      - name: Generate Release Notes
        id: release-notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --current -v --strip header
        env:
          OUTPUT: CHANGELOG.md
      
      # 3. 检查生成的 changelog 内容
      - name: Check changelog content
        id: check-changelog
        run: |
          echo "=========================================="
          echo "检查 Changelog 内容"
          echo "=========================================="
          
          RELEASE_NOTES="${{ steps.release-notes.outputs.content }}"
          
          if [ -z "$RELEASE_NOTES" ] || [ "$RELEASE_NOTES" = "" ]; then
            echo "⚠️  未检测到变更内容，将生成默认的 'No changes' 消息"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            RELEASE_NOTES="No changes in this release."
          else
            echo "✅ 检测到变更内容"
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo ""
            echo "Release Notes 预览："
            echo "----------------------------------------"
            echo "$RELEASE_NOTES" | head -20
            echo "----------------------------------------"
          fi
          
          # 将 Release Notes 保存到文件供 GitHub Release 使用
          # 移除前两行（二级标题和空行）
          echo "$RELEASE_NOTES" | tail -n +3 > /tmp/release_notes.md
          
          echo "=========================================="
      
      # 4. 创建 GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve-tag.outputs.tag }}
          name: ${{ steps.resolve-tag.outputs.tag }}
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      # 5. 输出执行结果
      - name: Summary
        if: success()
        run: |
          echo ""
          echo "=========================================="
          echo "✅ Release 创建成功！"
          echo "=========================================="
          echo ""
          echo "版本: ${{ steps.resolve-tag.outputs.tag }}"
          echo ""
          echo "GitHub Release:"
          echo "  ✅ 已创建"
          echo "  URL: https://github.com/${{ github.repository }}/releases/tag/${{ steps.resolve-tag.outputs.tag }}"
          echo ""
          echo "=========================================="
